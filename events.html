<!DOCTYPE html>
<html>
<head>
  <title>Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">🏆 Rankings</a>
  <a href="events.html">📅 Events</a>
</nav>

<div class="container">
  <h1>📅 Events</h1>
  <div id="events"></div>
</div>

<script>
fetch("data/events.json")
  .then(r => r.json())
  .then(data => {
    document.getElementById("events").innerHTML =
      data.map(e=>`
        <div class="card">
          <h3>${e.title}</h3>
          <p>${e.type}</p>
        </div>
      `).join("");
  });
</script>

</body>
</html>
