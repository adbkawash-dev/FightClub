<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>School Fight Club | Rankings</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body data-page="home">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span>SFC</span><strong>School Fight Club</strong></a>
      <nav>
        <a class="active" href="index.html">Leaderboard</a>
        <a href="fighters.html">Fighters</a>
        <a href="events.html">Events</a>
        <a href="rules.html">Rules</a>
        <a href="suggest.html">Suggest</a>
        <a href="admin.html">Admin</a>
      </nav>
    </aside>

    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">Competitive ranking system</p>
          <h1>School Fight Club</h1>
        </div>
        <div class="status-pill" id="connectionStatus">Loading league</div>
      </section>

      <section class="hero">
        <div>
          <p class="eyebrow">Current champion lock</p>
          <h2>Kinan at #1 and only loses the top spot after a valid defeat.</h2>
        </div>
        <div class="stat-grid">
          <div><span id="totalFighters">0</span><small>Fighters</small></div>
          <div><span id="validFightCount">0</span><small>Valid fights</small></div>
          <div><span id="ignoredFightCount">0</span><small>Ignored fights</small></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Leaderboard</p>
            <h2>Rankings</h2>
          </div>
        </div>

        <div id="leaderboard"></div>
      </section>
    </main>

    <!-- Firebase + App Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

  </body>
</html>
