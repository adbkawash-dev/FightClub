<!DOCTYPE html>
<html>
<head>
  <title>Fighters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">🏆 Rankings</a>
  <a href="fighters.html">👊 Fighters</a>
</nav>

<div class="container">
  <h1>👊 Fighters</h1>
  <div id="fighters"></div>
</div>

<script>
fetch("data/fighters.json")
  .then(r => r.json())
  .then(data => {
    document.getElementById("fighters").innerHTML =
      data.map(f=>`
        <div class="card">
          <h3>${f.name}</h3>
          <p>W:${f.wins} | L:${f.losses}</p>
        </div>
      `).join("");
  });
</script>

</body>
</html>
